name: Update Fuel Prices

on:
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fuel price fetcher
        env:
          FUEL_API_TOKEN: ${{ secrets.FUEL_API_TOKEN }}
        run: python fuel_price.py

      - name: Commit updated prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add prices.json
          git diff --staged --quiet || git commit -m "Update prices.json [skip ci]"
          git push
